name: Build GSMaiMai

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone JUCE
        run: git clone --depth 1 --branch 8.0.4 https://github.com/juce-framework/JUCE.git
      - name: Configure
        run: cmake -S . -B build -G "Ninja Multi-Config" -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"
      - name: Build
        run: cmake --build build --config Release
      - name: Package DMG
        run: |
          mkdir -p dist/installer
          cp -R build/GSMaiMai_artefacts/Release/VST3/GSMaiMai.vst3 dist/installer/
          cp -R build/GSMaiMai_artefacts/Release/AU/GSMaiMai.component dist/installer/
          cp installer/install.command dist/installer/
          cp installer/uninstall.command dist/installer/
          cp installer/README.txt dist/installer/
          chmod +x dist/installer/*.command
          hdiutil create -volname "GSMaiMai" -srcfolder dist/installer -ov -format UDZO GSMaiMai-macOS.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: GSMaiMai-macOS
          path: GSMaiMai-macOS.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone JUCE
        run: git clone --depth 1 --branch 8.0.4 https://github.com/juce-framework/JUCE.git
      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64
      - name: Build
        run: cmake --build build --config Release
      - name: Package
        run: |
          mkdir dist
          xcopy "build\GSMaiMai_artefacts\Release\VST3\GSMaiMai.vst3" "dist\GSMaiMai.vst3\" /e /i /y
          copy install_windows.bat dist\
          copy uninstall_windows.bat dist\
        shell: cmd
      - uses: actions/upload-artifact@v4
        with:
          name: GSMaiMai-Windows
          path: dist/

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            GSMaiMai-macOS/GSMaiMai-macOS.dmg
            GSMaiMai-Windows/*
